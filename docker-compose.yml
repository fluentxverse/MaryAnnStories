services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: maryannstories
      POSTGRES_USER: maryann
      POSTGRES_PASSWORD: maryann
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maryann -d maryannstories"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      PORT: 4000
      APP_FRONTEND_ORIGIN: ${APP_FRONTEND_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql://maryann:maryann@db:5432/maryannstories
      NULLCLAW_GATEWAY_URL: ${NULLCLAW_GATEWAY_URL:-http://127.0.0.1:3000}
      NULLCLAW_BEARER_TOKEN: ${NULLCLAW_BEARER_TOKEN:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_STORY_MODEL: ${OPENAI_STORY_MODEL:-gpt-5.2}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-dall-e-3}
      SEAWEED_S3_ENDPOINT: http://seaweed:8333
      SEAWEED_S3_BUCKET: story-images
      SEAWEED_S3_ACCESS_KEY: maryann
      SEAWEED_S3_SECRET_KEY: maryann-local-secret
      SEAWEED_FILER_ENDPOINT: http://seaweed:8888
      SEAWEED_PUBLIC_URL: ${SEAWEED_PUBLIC_URL:-http://localhost:18888}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  seaweed:
    image: chrislusf/seaweedfs:latest
    command: "server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json"
    ports:
      - "19333:9333"
      - "18080:8080"
      - "18888:8888"
      - "18333:8333"
    volumes:
      - seaweed_data:/data
      - ./seaweed/s3.json:/etc/seaweedfs/s3.json:ro

volumes:
  pgdata:
  seaweed_data:
